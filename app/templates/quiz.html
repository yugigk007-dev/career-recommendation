<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
</head>
<body>

<h2>Career Quiz</h2>

<form method="POST" action="/result/">
    {% csrf_token %}

    {% for q in questions %}
        <h3>{{ q.text }}</h3>

        {% for choice in q.choice_set.all %}
            <input type="checkbox" name="choices" value="{{ choice.id }}">
            {{ choice.text }}<br>
        {% endfor %}
    {% endfor %}

    <button type="submit">Submit</button>
</form>

</body>
</html>
